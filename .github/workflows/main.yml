name: GitHub Pages

on:
  push:
    branches:
      - master  # Set a branch to deploy
  pull_request:
      
jobs:
  deploy:
    runs-on: ubuntu-20.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v2
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.91.0"

      - name: Build
        run: hugo --minify # remove --minify tag if you do not need it, docs: https://gohugo.io/hugo-pipes/minification/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          personal_token: ${{ secrets.TOKEN }}
          external_repository: Tw1ddle/Tw1ddle.github.io
          publish_dir: ./public
          #   keep_files: true
          user_name: sam
          user_email: samcodesit@gmail.com
          publish_branch: master
        #   cname: example.com